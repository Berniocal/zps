<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generátor playlistu</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
:root{
  --bg:#f3f5f4;
  --card:#ffffff;
  --primary:#dfe7e2;
  --text:#1f2937;
}

body { 
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:700px;
  width:100%;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
}

h2{
  text-align:center;
  margin:0;
}

.name-input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:var(--primary);
  font-size:16px;
  outline:none;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 6px;
}

td, th{
  text-align:center;
  padding:10px;
}

tr{
  background:var(--primary);
}

input{
  width:70px;
  padding:6px;
  border-radius:8px;
  border:none;
  text-align:center;
  background:white;
}

button{
  border:none;
  border-radius:12px;
  padding:14px;
  font-size:15px;
  cursor:pointer;
  background:#e5e7eb;
}

#qrcode{
  display:flex;
  justify-content:center;
}

.theme-btn{
  position:fixed;
  top:12px;
  right:12px;
  width:38px;
  height:38px;
  border-radius:10px;
  border:none;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
  cursor:pointer;
}

/* DARK MODE */
body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --primary:#2a2a2a;
  --text:#ffffff;
}

body.dark input{
  background:#333;
  color:white;
}

body.dark button{
  background:#2f2f2f;
  color:white;
}

body.dark .theme-btn{
  background:#2f2f2f;
  color:white;
}
</style>
</head>

<body>

<button id="themeToggle" class="theme-btn">🌙</button>

<div class="container">

<div class="card">
<h2>Generátor playlistu</h2>
<input id="playlistName" class="name-input" placeholder="např. nedele">
</div>

<div class="card">
<table>
<tr><th>#</th><th>ID</th><th>Transp.</th></tr>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="card">
<button onclick="generate()">Stáhnout .proscholy</button>
<button onclick="generateQR()">Sdílet přes QR</button>
<input type="file" id="fileInput" accept=".proscholy" style="display:none">
<button onclick="document.getElementById('fileInput').click()">Načíst .proscholy</button>
<div id="qrcode"></div>
</div>

</div>

<script>
const tbody = document.getElementById("tableBody");

for (let i = 0; i < 20; i++) {
  const row = document.createElement("tr");
  row.innerHTML = `
    <td>${i+1}</td>
    <td><input id="id_${i}" type="number" inputmode="numeric"></td>
    <td><input id="trans_${i}" type="number" inputmode="numeric" value="0"></td>
  `;
  tbody.appendChild(row);
}

function getData(){
  const name = document.getElementById("playlistName").value || "playlist";
  const records=[];
  for(let i=0;i<20;i++){
    const id=document.getElementById(`id_${i}`).value.trim();
    const t=document.getElementById(`trans_${i}`).value.trim();
    if(id!==""){
      records.push({rank:i,song_lyric:{id:parseInt(id),transposition:parseInt(t||0)}});
    }
  }
  return {name,records};
}

function generate(){
  const data=getData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/octet-stream"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=data.name+".proscholy";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function generateQR(){
  const name=document.getElementById("playlistName").value||"playlist";
  const parts=[];
  for(let i=0;i<20;i++){
    const id=document.getElementById(`id_${i}`).value.trim();
    const t=document.getElementById(`trans_${i}`).value.trim();
    if(id!==""){ parts.push(id+","+ (t||0)); }
  }
  const shortData=name+"|"+parts.join(";");
  const url=location.origin+location.pathname+"#"+encodeURIComponent(shortData);

  const div=document.getElementById("qrcode");
  div.innerHTML="";
  QRCode.toCanvas(url,{width:220},(err,canvas)=>{ if(!err) div.appendChild(canvas); });
}

document.getElementById("fileInput").addEventListener("change",function(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);

      for(let i=0;i<20;i++){
        document.getElementById(`id_${i}`).value="";
        document.getElementById(`trans_${i}`).value=0;
      }

      document.getElementById("playlistName").value=data.name||"";

      data.records.forEach(r=>{
        const i=r.rank;
        if(i<20){
          document.getElementById(`id_${i}`).value=r.song_lyric.id;
          document.getElementById(`trans_${i}`).value=r.song_lyric.transposition ?? 0;
        }
      });

      generateQR();

    }catch(err){
      alert("Nepodařilo se načíst soubor");
    }
  };
  reader.readAsText(file);
});

const toggle = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  toggle.textContent = "☀️";
}

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  toggle.textContent = isDark ? "☀️" : "🌙";
};

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
