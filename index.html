<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generátor playlistu</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { 
  font-family: Arial; 
  padding: 15px; 
  display: flex;
  justify-content: center;
  background: #f5f5f5;
}

.container {
  max-width: 600px;
  width: 100%;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

table { width: 100%; border-collapse: collapse; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }

input { width: 70px; text-align: center; padding: 4px; }
.name-input { width: 100%; margin-bottom: 10px; padding: 6px; }

button { margin-top: 10px; padding: 12px; width: 100%; font-size: 16px; cursor: pointer; }

  .theme-btn {
  position: fixed;
  top: 10px;
  right: 10px;

  width: 40px;
  height: 40px;

  border-radius: 8px;
  border: none;

  background: #eee;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

body.dark .theme-btn {
  background: #333;
  color: white;
}

#qrcode { display:flex; justify-content:center; margin-top:10px; }

  

/* DARK MODE */
body.dark { background: #121212; color: white; }
body.dark .container { background: #1e1e1e; }
body.dark table, body.dark td, body.dark th { border-color: #555; }
body.dark input { background: #2a2a2a; color: white; border: 1px solid #555; }
</style>

<style>
:root{
  --bg:#f4f7f5;
  --card:#ffffff;
  --primary:#9aaea3;
  --primary-soft:#e3ebe7;
  --text:#1f2a24;
  --muted:#6b7d73;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  margin:0;
}

.container, .card, .box, .panel{
  background:var(--card);
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  padding:16px;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-size:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button:active{
  transform:scale(0.98);
}

input{
  border:none;
  border-radius:12px;
  padding:12px;
  background:var(--primary-soft);
  outline:none;
  font-size:16px;
}

h1,h2,h3{
  font-weight:600;
}


body.dark button{
  background:#2f2f2f;
  color:#ddd;
  box-shadow:none;
}
</style>

</head>

<body>

<button id="themeToggle" class="theme-btn">🌙</button>

<div class="container">

<h2>Generátor playlistu</h2>

<label>Název playlistu:</label>
<input id="playlistName" class="name-input" placeholder="např. nedele">

<table>
<tr><th>#</th><th>ID</th><th>Transp.</th></tr>
<tbody id="tableBody"></tbody>
</table>

<button onclick="generate()">Stáhnout .proscholy</button>
<button onclick="generateQR()">Sdílet přes QR</button>

<input type="file" id="fileInput" accept=".proscholy" style="display:none">
<button onclick="document.getElementById('fileInput').click()">Načíst .proscholy</button>

<div id="qrcode"></div>

</div>

<script>
const tbody = document.getElementById("tableBody");

for (let i = 0; i < 20; i++) {
  const row = document.createElement("tr");
  row.innerHTML = `
    <td>${i+1}</td>
    <td><input id="id_${i}" type="number" inputmode="numeric"></td>
    <td><input id="trans_${i}" type="number" inputmode="numeric" value="0"></td>
  `;
  tbody.appendChild(row);
}

function getData(){
  const name = document.getElementById("playlistName").value || "playlist";
  const records=[];
  for(let i=0;i<20;i++){
    const id=document.getElementById(`id_${i}`).value.trim();
    const t=document.getElementById(`trans_${i}`).value.trim();
    if(id!==""){
      records.push({rank:i,song_lyric:{id:parseInt(id),transposition:parseInt(t||0)}});
    }
  }
  return {name,records};
}

function generate(){
  const data=getData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/octet-stream"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=data.name+".proscholy";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function generateQR(){
  const name=document.getElementById("playlistName").value||"playlist";
  const parts=[];
  for(let i=0;i<20;i++){
    const id=document.getElementById(`id_${i}`).value.trim();
    const t=document.getElementById(`trans_${i}`).value.trim();
    if(id!==""){ parts.push(id+","+ (t||0)); }
  }
  const shortData=name+"|"+parts.join(";");
  const url=location.origin+location.pathname+"#"+encodeURIComponent(shortData);

  const div=document.getElementById("qrcode");
  div.innerHTML="";
  QRCode.toCanvas(url,{width:220},(err,canvas)=>{ if(!err) div.appendChild(canvas); });
}

window.onload=()=>{
  if(location.hash.length>1){
    try{
      const decoded=decodeURIComponent(location.hash.substring(1));
      const [name,data]=decoded.split("|");
      document.getElementById("playlistName").value=name||"";
      if(data){
        const items=data.split(";");
        items.forEach((item,i)=>{
          const [id,t]=item.split(",");
          if(id){
            document.getElementById(`id_${i}`).value=id;
            document.getElementById(`trans_${i}`).value=t||0;
          }
        });
      }

      setTimeout(()=>{
        if(confirm("Chcete stáhnout playlist '"+name+"'?")){
          generate();
        }
      },300);

    }catch(e){ console.log("QR chyba"); }
  }
};

document.getElementById("fileInput").addEventListener("change",function(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);

      for(let i=0;i<20;i++){
        document.getElementById(`id_${i}`).value="";
        document.getElementById(`trans_${i}`).value=0;
      }

      document.getElementById("playlistName").value=data.name||"";

      data.records.forEach(r=>{
        const i=r.rank;
        if(i<20){
          document.getElementById(`id_${i}`).value=r.song_lyric.id;
          document.getElementById(`trans_${i}`).value=r.song_lyric.transposition ?? 0;
        }
      });

      generateQR();

    }catch(err){
      alert("Nepodařilo se načíst soubor");
    }
  };
  reader.readAsText(file);
});

const toggle = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  toggle.textContent = "☀️";
}

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  toggle.textContent = isDark ? "☀️" : "🌙";
};

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
