<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generátor playlistu</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { 
  font-family: Arial; 
  padding: 15px; 
  display: flex;
  justify-content: center;
  background: #f5f5f5;
}

.container {
  max-width: 600px;
  width: 100%;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

table { 
  border-collapse: collapse; 
  width: 100%; 
}

td, th { 
  padding: 6px; 
  border: 1px solid #ccc; 
  text-align: center; 
}

input { 
  width: 70px; 
  text-align: center;
  padding: 4px;
}

.name-input {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
}

button { 
  margin-top: 10px; 
  padding: 12px; 
  width: 100%; 
  font-size: 16px; 
  cursor: pointer;
}

#qrcode {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">

<h2>Generátor playlistu</h2>

<label>Název playlistu:</label>
<input id="playlistName" class="name-input" placeholder="např. nedele">

<table>
<tr>
  <th>#</th>
  <th>ID</th>
  <th>Transp.</th>
</tr>
<tbody id="tableBody"></tbody>
</table>

<button onclick="generate()">Stáhnout .proscholy</button>
<button onclick="generateQR()">Sdílet přes QR</button>

<div id="qrcode"></div>

</div>

<script>
const tbody = document.getElementById("tableBody");

// vytvoření řádků
for (let i = 0; i < 20; i++) {
  const row = document.createElement("tr");

  row.innerHTML = `
    <td>${i + 1}</td>
    <td><input id="id_${i}"></td>
    <td><input id="trans_${i}" value="0"></td>
  `;

  tbody.appendChild(row);
}

// vytvoření dat
function getData() {
  const name = document.getElementById("playlistName").value || "playlist";
  const records = [];

  for (let i = 0; i < 20; i++) {
    const id = document.getElementById(`id_${i}`).value.trim();
    const trans = document.getElementById(`trans_${i}`).value.trim();

    if (id !== "") {
      records.push({
        rank: i,
        song_lyric: {
          id: parseInt(id),
          transposition: parseInt(trans || 0)
        }
      });
    }
  }

  return { name, records };
}

// export souboru
function generate() {
  const data = getData();

  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/octet-stream" }
  );

  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.setAttribute("download", data.name + ".proscholy");

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  URL.revokeObjectURL(url);
}

// QR generování
function generateQR() {
  const data = getData();

  const encoded = btoa(JSON.stringify(data));
  const url = location.origin + location.pathname + "#" + encoded;

  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  QRCode.toCanvas(url, { width: 220 }, function (error, canvas) {
    if (!error) qrDiv.appendChild(canvas);
  });
}

// načtení z QR / odkazu
window.onload = () => {
  if (location.hash.length > 1) {
    try {
      const decoded = JSON.parse(atob(location.hash.substring(1)));

      document.getElementById("playlistName").value = decoded.name || "";

      decoded.records.forEach(r => {
        document.getElementById(`id_${r.rank}`).value = r.song_lyric.id;
        document.getElementById(`trans_${r.rank}`).value = r.song_lyric.transposition || 0;
      });

    } catch (e) {
      console.log("Chyba při načítání dat");
    }
  }
};

// PWA registrace
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
